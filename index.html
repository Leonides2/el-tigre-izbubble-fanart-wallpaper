<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El tigre amimated wallpaper</title>
    <link rel="stylesheet" href="style.css">
    <script src="main.js" defer></script>
</head>
<body>
    <canvas id="layer-1" width="300" height="300"></canvas>
    <div class="layer-2"></div>
    <img src="eltigre_noBg_manual.png" alt="tiger" class="layer-3">
    <div class="layer-4">
        <div></div>
        <div style="display: flex; gap: 10px; justify-content: start;">
            <div style="display: flex; flex-direction: column; gap: 10px; width: 30%;">
                <span style="font-size: medium; font-weight: 500; padding-left: 1rem; margin-top: 2rem;"> Art made by: izbubbles</span>
                <span style="font-size: medium; font-weight: 200; padding-left: 1rem;"> Animated Wallpaper by: Leonides2</span>
            </div>

            <div style="width: 1px; background-color: white; height: auto; margin-top: 1rem; margin-bottom: 5rem;"></div>
            <div style="display: flex; flex-direction: column; gap: 10px; width: 30%;">
                <span style="font-size: medium; font-weight: 500; padding-left: 1rem; margin-top: 2rem;" id="audio-title"> No playing audio</span>
                <span style="font-size: medium; font-weight: 200; padding-left: 1rem;" id="audio-artist"></span>
                
            </div>
            <img id="thumbnail" src="image-placeholder.png"/>
        </div>
    </div>
    
</body>
</html>
